<div class="experience">
  <div class="container">
    <div class="experience__header">
      <h2 class="section-title">Experiência</h2>
      <p class="section-subtitle">
        Minha trajetória profissional e as habilidades que desenvolvi ao longo do caminho.
      </p>
    </div>

    <div class="experience__timeline">
      <article class="experience__item" *ngFor="let exp of experiencias; let last = last">
        <div class="experience__marker">
          <div class="experience__dot"></div>
          <div class="experience__line" [class.experience__line--hidden]="last"></div>
        </div>
        
        <div class="experience__content card">
          <div class="experience__header-info">
            <div>
              <h3 class="experience__role">{{ exp.role }}</h3>
              <p class="experience__company">
                <i class="material-icons">business</i>
                {{ exp.company }}
              </p>
            </div>
            <span class="experience__period tag">
              <i class="material-icons">calendar_today</i>
              {{ exp.period }}
            </span>
          </div>
          
          <p class="experience__description">
            {{ exp.description }}
          </p>
          
          <div class="experience__skills">
            <span class="tag" *ngFor="let skill of exp.skills">{{ skill }}</span>
          </div>
        </div>
      </article>
    </div>

    <div class="experience__cta">
      <p class="experience__cta-text">Interessado em trabalhar juntos?</p>
      <a href="mailto:luixcarlos00@gmail.com" class="btn btn-primary">
        <i class="material-icons">mail_outline</i>
        Entrar em Contato
      </a>
    </div>
  </div>
</div>
