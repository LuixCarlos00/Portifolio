<div class="about">
  <div class="container">
    <div class="about__header">
      <h2 class="section-title">Sobre Mim</h2>
    </div>

    <div class="about__content">
      <div class="about__text">
        <p class="about__description">{{ sobre.description }}</p>
      </div>

      <div class="about__skills">
        <h3 class="about__skills-title">
          <i class="material-icons">code</i>
          Especialidades
        </h3>
        
        <div class="about__skills-grid">
          <div class="skill-card card">
            <div class="skill-card__icon">
              <img src="assets/imagens/LogoJava.png" alt="Java" loading="lazy">
            </div>
            <h4 class="skill-card__name">Java</h4>
            <p class="skill-card__level">Avançado</p>
          </div>

          <div class="skill-card card">
            <div class="skill-card__icon">
              <img src="assets/imagens/LogoSpring.png" alt="Spring Boot" loading="lazy">
            </div>
            <h4 class="skill-card__name">Spring Boot</h4>
            <p class="skill-card__level">Avançado</p>
          </div>

          <div class="skill-card card">
            <div class="skill-card__icon">
              <img src="assets/imagens/LogoAngular.png" alt="Angular" loading="lazy">
            </div>
            <h4 class="skill-card__name">Angular</h4>
            <p class="skill-card__level">Intermediário</p>
          </div>

          <div class="skill-card card">
            <div class="skill-card__icon">
              <img src="assets/imagens/LogoTtypeScrip.png" alt="TypeScript" loading="lazy">
            </div>
            <h4 class="skill-card__name">TypeScript</h4>
            <p class="skill-card__level">Intermediário</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
