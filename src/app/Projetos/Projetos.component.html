<div class="projects">
  <div class="container">
    <div class="projects__header">
      <h2 class="section-title">Projetos</h2>
      <p class="section-subtitle">
        Conheça alguns dos projetos que desenvolvi, aplicando as melhores práticas de desenvolvimento.
      </p>
    </div>

    <div class="projects__content">
      <button 
        class="projects__nav projects__nav--prev" 
        (click)="previousPage()"
        aria-label="Projetos anteriores"
        [disabled]="currentPage === 0">
        <i class="material-icons">chevron_left</i>
      </button>

      <div class="projects__grid">
        <article 
          class="project-card card" 
          *ngFor="let item of visibleItems; let i = index"
          (click)="openProject(item.codigo)"
          [style.animation-delay]="(i * 0.1) + 's'"
          tabindex="0"
          role="button"
          [attr.aria-label]="'Ver projeto: ' + item.title">
          
          <div class="project-card__image">
            <img [src]="item.imageUrl" [alt]="item.title" loading="lazy">
            <div class="project-card__overlay">
              <span class="project-card__view">
                <i class="material-icons">visibility</i>
                Ver Detalhes
              </span>
            </div>
            <span class="project-card__number">{{ item.codigo | number:'2.0' }}</span>
          </div>

          <div class="project-card__content">
            <h3 class="project-card__title">{{ item.title }}</h3>
            <div class="project-card__description" [innerHTML]="sanitize(item.description)"></div>
            <div class="project-card__footer">
              <span class="project-card__cta">
                <i class="material-icons">open_in_new</i>
                Ver projeto
              </span>
            </div>
          </div>
        </article>
      </div>

      <button 
        class="projects__nav projects__nav--next" 
        (click)="nextPage()"
        aria-label="Próximos projetos">
        <i class="material-icons">chevron_right</i>
      </button>
    </div>

    <div class="projects__pagination" *ngIf="totalPages > 1">
      <button 
        *ngFor="let page of [].constructor(totalPages); let i = index"
        class="projects__dot"
        [class.projects__dot--active]="i === currentPage"
        (click)="goToPage(i)"
        [attr.aria-label]="'Ir para página ' + (i + 1)">
      </button>
    </div>
  </div>
</div>
